<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Tenpai · Riichi Mahjong</title>

    <!-- Installable PWA (add to home screen, fullscreen launch) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0b3d2e" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <!-- iOS ignores the manifest display mode; these give the fullscreen, chrome-less launch -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tenpai" />
    <style>
      html, body, #root { height: 100%; margin: 0; }
      body { background: #0b3d2e; overflow: hidden; }
      /* keep UI clear of notches/rounded corners when launched fullscreen */
      #root {
        box-sizing: border-box;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
